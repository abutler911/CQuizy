<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CQuizy - Flashcards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />
    <link rel="icon" href="./favicon/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Mystery+Quest&family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/main.css" />
    <meta name="theme-color" content="#000000" />
  </head>

  <body>
    <div class="starfield"></div>

    <header class="text-center py-2 position-relative">
      <button id="theme-toggle" class="btn btn-sm btn-outline-light position-absolute top-0 end-0 m-2">
        <i class="fas fa-moon"></i>
      </button>
      <h1 class="title">CQuizy</h1>
      <h2 class="shimmer">Flashcards</h2>
      <p class="mb-0" id="footer">Copyright &copy; <span id="current-year">2025</span> | Version 1.0</p>
    </header>

    <div class="timer-display text-center mb-2">
      <small>Study time: <span id="timer-display">00:00</span></small>
    </div>

    <div class="container d-flex flex-column justify-content-center align-items-center">
      <div class="nav-buttons d-flex justify-content-center mb-3">
        <a href="limitations.html" class="btn green-btn mx-2">Limitations</a>
        <a href="memory.html" class="btn green-btn mx-2">Memory Items</a>
      </div>

      <div class="progress mb-2" style="height: 8px; width: 90%; max-width: 370px">
        <div id="progress-bar" class="progress-bar bg-success" style="width: 0%"></div>
      </div>
      <div id="progress-text" class="small mb-3"></div>

      <div class="input-group mb-4" style="max-width: 370px">
        <input type="text" id="search-input" class="form-control" placeholder="Search questions..." />
        <button id="search-btn" class="btn btn-outline-secondary">
          <i class="fas fa-search"></i>
        </button>
      </div>

      <div class="card-container">
        <div class="card-inner">
          <div class="card-front d-flex flex-column">
            <button class="bookmark-btn">
              <i class="fas fa-bookmark"></i>
            </button>
            <small class="category"></small>
            <hr class="divider" />
            <small class="context"></small>
            <div class="question"></div>
          </div>
          <div class="card-back d-flex justify-content-center align-items-center">
            <div class="answer"></div>
          </div>
        </div>
      </div>

      <div class="control-panel mt-4">
        <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
          <button class="btn btn-lg btn-primary rounded-circle shadow-sm left-arrow" style="width: 60px; height: 60px;">
            <i class="fas fa-chevron-left"></i>
          </button>
          <button class="btn btn-lg btn-info rounded-circle shadow" id="randomize-btn" style="width: 70px; height: 70px;">
            <i class="fas fa-random"></i>
          </button>
          <button class="btn btn-lg btn-primary rounded-circle shadow-sm right-arrow" style="width: 60px; height: 60px;">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        <button id="review-later-btn" class="btn btn-success rounded-pill px-4 py-2 d-block mx-auto shadow-sm">
          <i class="fas fa-bookmark me-2"></i>Review Marked
        </button>
      </div>

      <div class="status-container mt-3">
        <div id="spinner-container">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
        <div id="shuffling-message" class="status-message">Shuffling...</div>
      </div>

      <div class="shortcut-helper mt-3 mb-4">
        <small>
          <span class="badge bg-dark">←→</span> Navigate &nbsp;
          <span class="badge bg-dark">Space</span> Flip &nbsp;
          <span class="badge bg-dark">B</span> Bookmark &nbsp;
          <span class="badge bg-dark">R</span> Shuffle
        </small>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/stars.js"></script>
    <script src="./js/timer.js"></script>
    <script src="./js/script.js"></script>

    <script>
      // Update copyright year automatically
      document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
